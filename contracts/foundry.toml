# Nortoken Contracts — a "mina" do Verso Mazari (token musculoso + hook V4 + lock maleável)
# Solidity 0.8.26 (constraint do v4-core) · EVM cancun (V4 exige transient storage)

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = true
fs_permissions = [{ access = "read-write", path = "./" }]
gas_reports = ["NortokenERC20", "MazariSwapHook", "MalleableLiquidityLock"]

[profile.default.fuzz]
runs = 1000

[profile.ci.fuzz]
runs = 100000

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
